name: Bug Report
description: Something in sDeck isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Config → ...
        2. Press ...
        3. See error
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: e.g. Windows 11 + Chrome (host), or iPhone 14 + Safari (remote control device)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: node --version
  - type: dropdown
    id: integrations
    attributes:
      label: Which integration(s) are involved, if any?
      multiple: true
      options:
        - OBS Studio
        - Spotify
        - Twitch Chat
        - Streamlabs
        - Soundboard
        - None of the above
  - type: textarea
    id: logs
    attributes:
      label: Console / terminal output
      description: Browser DevTools console errors and/or the server terminal output around when it happened.
      render: shell
