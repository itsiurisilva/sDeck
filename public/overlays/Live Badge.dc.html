<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html,body{background:transparent!important;margin:0;padding:0;overflow:hidden;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(232,160,32,0.18)}50%{box-shadow:0 0 28px rgba(232,160,32,0.5),0 0 56px rgba(232,160,32,0.18)}}
  </style>
</helmet>
<div style="position:relative;width:1920px;height:1080px;overflow:hidden;font-family:'Press Start 2P',monospace;">
  <div style="position:absolute;top:32px;left:32px;">
    <div style="background:rgba(8,6,20,0.93);border:2px solid {{ isLive ? '#E8A020' : '#4a3f5a' }};padding:15px 30px;display:flex;align-items:center;gap:18px;animation:{{ isLive ? 'glowPulse 2.2s ease-in-out infinite' : 'none' }};">
      <div style="width:16px;height:16px;background:{{ isLive ? '#FF3300' : '#4a3f5a' }};border-radius:50%;flex-shrink:0;animation:{{ isLive ? 'blink 1s step-start infinite' : 'none' }};box-shadow:{{ isLive ? '0 0 12px rgba(255,51,0,0.9),0 0 24px rgba(255,80,0,0.5)' : 'none' }};"></div>
      <span style="font-size:24px;color:{{ isLive ? '#E8A020' : '#4a3f5a' }};letter-spacing:0.16em;text-shadow:{{ isLive ? '0 0 18px rgba(232,160,32,0.6)' : 'none' }};">{{ isLive ? 'LIVE' : 'OFFLINE' }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}"></script>
</body>
</html>
