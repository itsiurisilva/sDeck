<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
  <style>
    html,body{background:transparent!important;margin:0;padding:0;overflow:hidden;}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes eqBar{0%,100%{transform:scaleY(0.1)}50%{transform:scaleY(1)}}
    @keyframes amberPulse{0%,100%{box-shadow:0 0 22px rgba(232,160,32,0.15),inset 0 0 30px rgba(0,0,0,0.55)}50%{box-shadow:0 0 44px rgba(232,160,32,0.32),0 0 90px rgba(232,160,32,0.1),inset 0 0 30px rgba(0,0,0,0.55)}}
    @keyframes widgetGlow{0%,100%{box-shadow:0 0 18px rgba(232,160,32,0.1)}50%{box-shadow:0 0 38px rgba(232,160,32,0.22),0 4px 40px rgba(0,0,0,0.5)}}
  </style>
</helmet>
<svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
  <symbol id="leaf-disc" viewBox="0 0 16 16">
    <rect x="7" y="13" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="6" y="8" width="4" height="5" fill="#3d9e46"></rect>
    <rect x="7" y="5" width="2" height="5" fill="#3d9e46"></rect>
    <rect x="3" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="2" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="4" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="11" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="7" y="3" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="5" y="7" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="9" y="7" width="2" height="2" fill="#4aba5a"></rect>
  </symbol>
</svg>
<div style="position:relative;width:1920px;height:1080px;overflow:hidden;font-family:'Press Start 2P',monospace;">
  <div style="position:absolute;bottom:284px;left:22px;width:420px;background:rgba(8,6,20,0.95);border:2px solid #E8A020;padding:18px 20px;box-sizing:border-box;animation:widgetGlow 3s ease-in-out infinite;">
    <div style="font-size:10px;color:#E8A020;letter-spacing:0.14em;margin-bottom:14px;">♪ NOW PLAYING</div>
    <div style="display:flex;align-items:flex-start;gap:18px;margin-bottom:14px;">
      <div style="position:relative;width:148px;height:148px;flex-shrink:0;">
        <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#1c1830 0deg,#28203e 35deg,#1c1830 70deg,#28203e 105deg,#1c1830 140deg,#28203e 175deg,#1c1830 210deg,#28203e 245deg,#1c1830 280deg,#28203e 315deg,#1c1830 350deg,#28203e 360deg);animation:{{ isPlaying ? 'spin 7s linear infinite' : 'none' }},amberPulse 3s ease-in-out infinite;">
          <div style="position:absolute;inset:8%;border-radius:50%;border:1px solid rgba(232,160,32,0.08);"></div>
          <div style="position:absolute;inset:18%;border-radius:50%;border:1px solid rgba(232,160,32,0.06);"></div>
          <div style="position:absolute;inset:28%;border-radius:50%;border:1px solid rgba(232,160,32,0.04);"></div>
        </div>
        <div style="position:absolute;top:50%;left:50%;width:66px;height:66px;margin:-33px;border-radius:50%;background:#130f26;border:2px solid rgba(232,160,32,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;z-index:5;overflow:hidden;">
          <sc-if value="{{ albumArt }}">
            <img src="{{ albumArt }}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
          </sc-if>
          <sc-if value="!{{ albumArt }}">
            <svg viewBox="0 0 16 16" width="24" height="24" style="image-rendering:pixelated;" xmlns="http://www.w3.org/2000/svg"><use href="#leaf-disc"></use></svg>
            <div style="font-size:6px;color:#E8A020;letter-spacing:0.02em;">2835</div>
          </sc-if>
        </div>
        <div style="position:absolute;top:50%;left:50%;width:10px;height:10px;margin:-5px;border-radius:50%;background:#0d0b18;z-index:6;"></div>
      </div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:7px;padding-top:4px;">
        <div style="font-family:'VT323',monospace;font-size:38px;color:#f0e6d0;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ trackName || 'Nenhuma música' }}</div>
        <div style="font-family:'VT323',monospace;font-size:28px;color:#E8A020;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ artistName || 'Spotify' }}</div>
        <div style="margin-top:6px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-family:'VT323',monospace;font-size:20px;color:#4a3f5a;">{{ progress || '0:00' }}</span>
            <span style="font-family:'VT323',monospace;font-size:20px;color:#3d9e46;">{{ duration || '0:00' }}</span>
          </div>
          <div style="height:5px;background:rgba(255,255,255,0.07);position:relative;border-radius:2px;">
            <div style="position:absolute;left:0;top:0;height:100%;width:{{ progressPercent || 0 }}%;background:linear-gradient(90deg,#FF6600,#E8A020);border-radius:2px;"></div>
            <div style="position:absolute;left:{{ progressPercent || 0 }}%;top:50%;width:12px;height:12px;margin:-6px;border-radius:50%;background:#E8A020;box-shadow:0 0 8px rgba(232,160,32,0.8);"></div>
          </div>
        </div>
      </div>
    </div>
    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(232,160,32,0.3),transparent);margin-bottom:10px;"></div>
    <div style="height:44px;display:flex;gap:3px;align-items:flex-end;overflow:hidden;">{{ bars }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}">
class Component extends DCLogic {
  state = { bars: null };
  componentDidMount() {
    const colors = [
      'linear-gradient(0deg,#FF3300,#FF6600,#E8A020)',
      'linear-gradient(0deg,#FF4400,#FF8800,#E8C020)',
      'linear-gradient(0deg,#DD7700,#E8A020,#FFD060)',
    ];
    const bars = Array.from({ length: 26 }, (_, i) => {
      const dur = (1.1 + (i * 0.14) % 1.3).toFixed(2);
      const delay = ((i * 0.041) % 0.48).toFixed(2);
      return React.createElement('div', {
        key: i,
        style: { flex: 1, background: colors[i % 3], animation: `eqBar ${dur}s ease-in-out infinite ${delay}s`, transformOrigin: 'bottom', height: '100%', opacity: 0.82 }
      });
    });
    this.setState({ bars });
  }
  renderVals() { return { bars: this.state.bars || [] }; }
}
</script>
</body>
</html>
