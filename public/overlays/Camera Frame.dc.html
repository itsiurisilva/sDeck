<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html,body{background:transparent!important;margin:0;padding:0;overflow:hidden;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes camGlow{0%,100%{box-shadow:0 0 16px rgba(232,160,32,0.12),0 0 0 0 transparent}50%{box-shadow:0 0 34px rgba(232,160,32,0.3),0 0 70px rgba(232,160,32,0.1)}}
  </style>
</helmet>
<div style="position:relative;width:1920px;height:1080px;overflow:hidden;font-family:'Press Start 2P',monospace;">
  <div style="position:absolute;bottom:22px;left:22px;width:380px;height:248px;">
    <div style="position:absolute;inset:0;border:3px solid #E8A020;animation:camGlow 3s ease-in-out infinite;"></div>
    <div style="position:absolute;top:-3px;left:-3px;width:34px;height:34px;border-top:7px solid #FF6600;border-left:7px solid #FF6600;"></div>
    <div style="position:absolute;top:-3px;right:-3px;width:34px;height:34px;border-top:7px solid #FF6600;border-right:7px solid #FF6600;"></div>
    <div style="position:absolute;bottom:-3px;left:-3px;width:34px;height:34px;border-bottom:7px solid #FF6600;border-left:7px solid #FF6600;"></div>
    <div style="position:absolute;bottom:-3px;right:-3px;width:34px;height:34px;border-bottom:7px solid #FF6600;border-right:7px solid #FF6600;"></div>
    <div style="position:absolute;top:10px;left:10px;background:rgba(8,6,20,0.91);border:1px solid #E8A020;padding:6px 14px;display:flex;align-items:center;gap:9px;">
      <div style="width:10px;height:10px;background:#FF3300;border-radius:50%;animation:blink 1s step-start infinite;"></div>
      <span style="font-size:11px;color:#E8A020;letter-spacing:0.1em;">LIVE</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}"></script>
</body>
</html>
