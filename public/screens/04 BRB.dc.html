<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;padding:0;overflow:hidden;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes eqBar{0%,100%{transform:scaleY(0.12)}50%{transform:scaleY(1)}}
    @keyframes scanMove{0%{top:-6px}100%{top:1086px}}
    @keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.85;transform:scale(1.06)}}
    @keyframes fadeFlicker{0%,90%,100%{opacity:1}93%,97%{opacity:0.6}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  </style>
</helmet>

<svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-leaf" viewBox="0 0 16 16">
    <rect x="7" y="13" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="6" y="8" width="4" height="5" fill="#3d9e46"></rect>
    <rect x="7" y="5" width="2" height="5" fill="#3d9e46"></rect>
    <rect x="3" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="2" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="4" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="11" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="7" y="3" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="5" y="7" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="9" y="7" width="2" height="2" fill="#4aba5a"></rect>
  </symbol>
</svg>

<div style="width:1920px;height:1080px;position:relative;font-family:'Press Start 2P',monospace;overflow:hidden;background:radial-gradient(ellipse 70% 60% at 50% 35%, rgba(48,36,148,0.55) 0%, transparent 65%), radial-gradient(ellipse 50% 40% at 15% 80%, rgba(232,140,20,0.14) 0%, transparent 55%), radial-gradient(ellipse 45% 38% at 85% 75%, rgba(232,160,32,0.18) 0%, transparent 52%), #0d0b18;display:flex;align-items:stretch;">

  <div style="position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 58px,rgba(232,160,32,0.02) 58px,rgba(232,160,32,0.02) 59px);pointer-events:none;"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#FF3300,#FF6600,#E8A020,#FF6600,#FF3300);animation:fadeFlicker 2.4s ease-in-out infinite;z-index:20;"></div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:8px;background:linear-gradient(90deg,#FF3300,#FF6600,#E8A020,#FF6600,#FF3300);animation:fadeFlicker 2.7s ease-in-out infinite 0.8s;z-index:20;"></div>
  <div style="position:absolute;left:0;right:0;height:5px;background:rgba(255,255,255,0.04);animation:scanMove 5s linear infinite;z-index:25;pointer-events:none;"></div>

  <!-- LEFT: BRB TEXT -->
  <div style="flex:none;width:840px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:28px;position:relative;z-index:10;padding:40px;box-sizing:border-box;">
    <div style="font-size:180px;color:#E8A020;letter-spacing:0.08em;text-shadow:0 0 60px rgba(232,160,32,0.4),0 0 120px rgba(232,160,32,0.16),6px 0 #FF6600,-6px 0 #FFB300;line-height:1;">BRB</div>
    <div style="height:56px;width:600px;display:flex;gap:5px;align-items:flex-end;overflow:hidden;">{{ wavePaused }}</div>
      <div style="text-align:center;display:flex;flex-direction:column;gap:12px;">
        <div style="font-size:28px;color:#f0e6d0;letter-spacing:0.06em;">SAMUCA2835</div>
        <div style="font-family:'VT323',monospace;font-size:46px;color:#E8A020;letter-spacing:0.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:800px;">{{ trackName ? 'A OUVIR: ' + trackName : 'VOLTO JÁ MALTINHA... ♪' }}</div>
      </div>
    <div style="display:flex;align-items:center;gap:20px;animation:pulse 3.5s ease-in-out infinite;">
      <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:50px;height:50px;opacity:0.65;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
      <div style="font-family:'VT323',monospace;font-size:54px;color:#3d9e46;letter-spacing:0.22em;">4 : 2 0</div>
      <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:50px;height:50px;opacity:0.65;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
    </div>
    <div style="font-family:'VT323',monospace;font-size:32px;color:#3a3060;letter-spacing:0.08em;">twitch.tv/Samuca2835</div>
  </div>

  <!-- RIGHT: BIG VINYL + SAMS -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;overflow:hidden;">
    <div style="position:relative;width:560px;height:560px;">
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#1c1830 0deg,#252040 30deg,#1c1830 60deg,#252040 90deg,#1c1830 120deg,#252040 150deg,#1c1830 180deg,#252040 210deg,#1c1830 240deg,#252040 270deg,#1c1830 300deg,#252040 330deg,#1c1830 360deg);animation:{{ isPlaying ? 'spin 11s linear infinite' : 'none' }};box-shadow:0 0 50px rgba(232,160,32,0.2),inset 0 0 40px rgba(0,0,0,0.5);">
        <div style="position:absolute;inset:7%;border-radius:50%;border:1px solid rgba(232,160,32,0.06);"></div>
        <div style="position:absolute;inset:15%;border-radius:50%;border:1px solid rgba(232,160,32,0.05);"></div>
        <div style="position:absolute;inset:23%;border-radius:50%;border:1px solid rgba(232,160,32,0.04);"></div>
        <div style="position:absolute;inset:31%;border-radius:50%;border:1px solid rgba(232,160,32,0.04);"></div>
      </div>
      <div style="position:absolute;top:50%;left:50%;width:176px;height:176px;margin:-88px;border-radius:50%;background:#130f26;border:3px solid rgba(232,160,32,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;box-shadow:0 0 28px rgba(232,160,32,0.2);overflow:hidden;">
        <sc-if value="{{ albumArt }}">
          <img src="{{ albumArt }}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
        </sc-if>
        <sc-if value="!{{ albumArt }}">
          <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:60px;height:60px;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
          <div style="font-size:12px;color:#E8A020;letter-spacing:0.06em;">SAMUCA</div>
        </sc-if>
      </div>
      <div style="position:absolute;top:50%;left:50%;width:16px;height:16px;margin:-8px;border-radius:50%;background:#0d0b18;z-index:6;"></div>
    </div>
    <!-- SAMS — position preserved from user edits -->
    <img src="../uploads/SAMS.no.bg.png" style="position:absolute;left:112px;top:376px;height:700px;width:auto;z-index:12;filter:drop-shadow(4px 0 20px rgba(232,160,32,0.15));" alt="Sams" />
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}">
class Component extends DCLogic {
  state = { waves: null };
  componentDidMount() {
    const amber = ['linear-gradient(0deg,#CC7700,#E8A020,#FFD060)','linear-gradient(0deg,#BB6600,#E8B030,#FFE080)','linear-gradient(0deg,#DD8800,#E8A020,#FFC040)'];
    const paused = Array.from({length: 24}, (_, i) => React.createElement('div', {
      key: `p-${i}`,
      style: { flex: 1, background: amber[i % amber.length], height: `${12 + ((i * 7 + 3) % 28)}%`, opacity: 0.45, borderRadius: '2px 2px 0 0' }
    }));
    this.setState({ waves: { paused } });
  }
  renderVals() { return { wavePaused: (this.state.waves || {}).paused || [] }; }
}
</script>
</body>
</html>
