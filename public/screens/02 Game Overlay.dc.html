<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
  <style>
    html, body{margin:0;padding:0;overflow:hidden;background:transparent !important;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes eqBar{0%,100%{transform:scaleY(0.12)}50%{transform:scaleY(1)}}
    @keyframes alertIn{0%,4%{transform:translateX(110%);opacity:0}14%,76%{transform:translateX(0);opacity:1}86%,100%{transform:translateX(-110%);opacity:0}}
    @keyframes scanMove{0%{top:-6px}100%{top:1086px}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  </style>
</helmet>

<svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-leaf" viewBox="0 0 16 16">
    <rect x="7" y="13" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="6" y="8" width="4" height="5" fill="#3d9e46"></rect>
    <rect x="7" y="5" width="2" height="5" fill="#3d9e46"></rect>
    <rect x="3" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="2" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="4" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="11" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="7" y="3" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="5" y="7" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="9" y="7" width="2" height="2" fill="#4aba5a"></rect>
  </symbol>
</svg>

<div style="width:1920px;height:1080px;position:relative;font-family:'Press Start 2P',monospace;overflow:hidden;background:transparent;">
  <div style="position:absolute;left:0;right:0;height:5px;background:rgba(255,255,255,0.03);animation:scanMove 6s linear infinite;z-index:30;pointer-events:none;"></div>

  <!-- TOP HUD -->
  <div style="position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(180deg,rgba(8,6,24,0.92) 0%,transparent 100%);z-index:10;display:flex;align-items:center;padding:0 32px;gap:16px;box-sizing:border-box;">
    <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:34px;height:34px;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
    <div style="font-size:24px;color:#E8A020;text-shadow:0 0 20px rgba(232,160,32,0.55);letter-spacing:0.06em;">SAMUCA2835</div>
    <div style="background:#3d9e46;color:#f0e6d0;font-size:12px;padding:5px 13px;">420</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;background:#E8A020;border-radius:50%;animation:blink 1s step-start infinite;"></div>
      <span style="font-size:17px;color:#E8A020;letter-spacing:0.12em;">LIVE</span>
    </div>
  </div>

  <!-- SIMPLE BOTTOM FADE -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:70px;background:linear-gradient(0deg,rgba(8,6,24,0.88) 0%,transparent 100%);z-index:8;pointer-events:none;"></div>

  <!-- NOW PLAYING + BARS above cam -->
  <div style="position:absolute;bottom:278px;left:22px;width:386px;z-index:15;background:rgba(8,6,20,0.95);border:2px solid #E8A020;border-bottom:none;padding:11px 14px 9px;box-sizing:border-box;">
    <div style="font-size:11px;color:#E8A020;margin-bottom:4px;letter-spacing:0.09em;">♪ NOW PLAYING</div>
    <div style="font-family:'VT323',monospace;font-size:26px;color:#f0e6d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px;">{{ trackName || 'Nenhuma música' }} — {{ artistName || 'Spotify' }} · <span style="color:#3d9e46;">{{ duration || '0:00' }}</span></div>
    <div style="height:28px;display:flex;gap:3px;align-items:flex-end;overflow:hidden;">{{ waveS2 }}</div>
  </div>

  <!-- FACE CAM -->
  <div style="position:absolute;bottom:22px;left:22px;width:380px;height:248px;border:3px solid #E8A020;box-shadow:0 0 30px rgba(232,160,32,0.25);z-index:12;background:transparent;overflow:hidden;">
    <div style="position:absolute;top:-3px;left:-3px;width:26px;height:26px;border-top:6px solid #FF6600;border-left:6px solid #FF6600;"></div>
    <div style="position:absolute;top:-3px;right:-3px;width:26px;height:26px;border-top:6px solid #FF6600;border-right:6px solid #FF6600;"></div>
    <div style="position:absolute;bottom:-3px;left:-3px;width:26px;height:26px;border-bottom:6px solid #FF6600;border-left:6px solid #FF6600;"></div>
    <div style="position:absolute;bottom:-3px;right:-3px;width:26px;height:26px;border-bottom:6px solid #FF6600;border-right:6px solid #FF6600;"></div>
  </div>

  <!-- VINYL DECO bottom-right -->
  <div style="position:absolute;bottom:-40px;right:-40px;width:280px;height:280px;border-radius:50%;background:conic-gradient(#18152e 0deg,#201c38 50deg,#18152e 100deg,#201c38 150deg,#18152e 200deg,#201c38 250deg,#18152e 300deg,#201c38 350deg,#18152e 360deg);opacity:0.3;animation:spin 18s linear infinite;z-index:9;">
    <div style="position:absolute;top:50%;left:50%;width:120px;height:120px;margin:-60px;border-radius:50%;background:#0d0b18;"></div>
    <div style="position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px;border-radius:50%;background:#1c1830;border:1px solid rgba(232,160,32,0.2);"></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}">
class Component extends DCLogic {
  state = { waves: null };
  componentDidMount() {
    const make = (n, prefix, cols) => Array.from({length: n}, (_, i) => {
      const dur = (1.1 + ((i * 0.14) % 1.3)).toFixed(2);
      const delay = ((i * 0.041) % 0.48).toFixed(2);
      return React.createElement('div', { key: `${prefix}-${i}`, style: { flex: 1, background: cols[i % cols.length], animation: `eqBar ${dur}s ease-in-out infinite ${delay}s`, transformOrigin: 'bottom', height: '100%', opacity: 0.75 } });
    });
    const amber = ['linear-gradient(0deg,#CC7700,#E8A020,#FFD060)','linear-gradient(0deg,#BB6600,#E8B030,#FFE080)','linear-gradient(0deg,#DD8800,#E8A020,#FFC040)'];
    this.setState({ waves: { s2: make(18,'s2',amber) } });
  }
  renderVals() { return { waveS2: (this.state.waves || {}).s2 || [] }; }
}
</script>
</body>
</html>
