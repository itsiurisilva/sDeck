<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;padding:0;overflow:hidden;}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes eqBar{0%,100%{transform:scaleY(0.12)}50%{transform:scaleY(1)}}
    @keyframes alertIn{0%,4%{transform:translateX(110%);opacity:0}14%,76%{transform:translateX(0);opacity:1}86%,100%{transform:translateX(-110%);opacity:0}}
    @keyframes scanMove{0%{top:-6px}100%{top:1086px}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes amberPulse{0%,100%{box-shadow:0 0 30px rgba(232,160,32,0.2),0 0 60px rgba(232,160,32,0.08)}50%{box-shadow:0 0 50px rgba(232,160,32,0.35),0 0 100px rgba(232,160,32,0.15)}}
  </style>
</helmet>

<svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
  <symbol id="ico-leaf" viewBox="0 0 16 16">
    <rect x="7" y="13" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="6" y="8" width="4" height="5" fill="#3d9e46"></rect>
    <rect x="7" y="5" width="2" height="5" fill="#3d9e46"></rect>
    <rect x="3" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="2" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="4" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="9" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="11" y="7" width="3" height="2" fill="#4aba5a"></rect>
    <rect x="10" y="5" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="7" y="3" width="2" height="3" fill="#4aba5a"></rect>
    <rect x="5" y="7" width="2" height="2" fill="#4aba5a"></rect>
    <rect x="9" y="7" width="2" height="2" fill="#4aba5a"></rect>
  </symbol>
</svg>

<div style="width:1920px;height:1080px;position:relative;font-family:'Press Start 2P',monospace;overflow:hidden;background:radial-gradient(ellipse 60% 50% at 18% 58%, rgba(48,36,148,0.5) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 85% 30%, rgba(232,140,20,0.12) 0%, transparent 55%), radial-gradient(ellipse 35% 28% at 88% 85%, rgba(232,160,32,0.18) 0%, transparent 50%), #0d0b18;">

  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(232,160,32,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,32,0.025) 1px,transparent 1px);background-size:96px 96px;pointer-events:none;"></div>
  <div style="position:absolute;left:0;right:0;height:5px;background:rgba(255,255,255,0.03);animation:scanMove 5s linear infinite;z-index:30;pointer-events:none;"></div>

  <!-- TOP BAR -->
  <div style="position:absolute;top:0;left:0;right:0;height:80px;background:rgba(8,6,20,0.97);border-bottom:3px solid #E8A020;display:flex;align-items:center;padding:0 36px;gap:18px;box-sizing:border-box;z-index:20;">
    <div style="font-size:28px;color:#E8A020;letter-spacing:0.06em;text-shadow:0 0 28px rgba(232,160,32,0.5);white-space:nowrap;">SAMUCA2835</div>
    <div style="background:#3d9e46;color:#f0e6d0;font-size:13px;padding:7px 15px;letter-spacing:0.08em;flex-shrink:0;">420</div>
    <div style="flex:1;overflow:hidden;height:80px;position:relative;display:flex;align-items:center;">
      <div style="position:absolute;white-space:nowrap;animation:alertIn 13s ease-in-out infinite;display:flex;align-items:center;gap:18px;">
      </div>
    </div>
    <div style="font-family:'VT323',monospace;font-size:32px;color:#4a3f5a;white-space:nowrap;flex-shrink:0;">JUST CHATTING</div>
  </div>

  <!-- MAIN -->
  <div style="position:absolute;top:80px;left:0;right:0;bottom:0;display:flex;">

    <!-- CAM -->
    <div style="flex:1;position:relative;border-right:3px solid #E8A020;">
      <div style="position:absolute;inset:18px;border:3px solid #E8A020;background:rgba(13,11,24,0.55);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <div style="position:absolute;top:-3px;left:-3px;width:38px;height:38px;border-top:7px solid #FF6600;border-left:7px solid #FF6600;"></div>
        <div style="position:absolute;top:-3px;right:-3px;width:38px;height:38px;border-top:7px solid #FF6600;border-right:7px solid #FF6600;"></div>
        <div style="position:absolute;bottom:-3px;left:-3px;width:38px;height:38px;border-bottom:7px solid #FF6600;border-left:7px solid #FF6600;"></div>
        <div style="position:absolute;bottom:-3px;right:-3px;width:38px;height:38px;border-bottom:7px solid #FF6600;border-right:7px solid #FF6600;"></div>
        <div style="color:#2a2445;font-size:24px;text-align:center;line-height:2.2;letter-spacing:0.04em;">FACE CAM<br/><span style="font-size:14px;color:#1e193a;">DROP OBS VIDEO CAPTURE HERE</span></div>
      </div>
      <div style="position:absolute;top:30px;left:30px;background:#E8A020;color:#0d0b18;font-size:17px;padding:10px 22px;display:flex;align-items:center;gap:12px;z-index:5;letter-spacing:0.1em;">
        <div style="width:14px;height:14px;background:#0d0b18;border-radius:50%;animation:blink 1s step-start infinite;"></div>
        LIVE
      </div>
      <div style="position:absolute;bottom:18px;left:18px;right:18px;height:60px;display:flex;gap:3px;align-items:flex-end;overflow:hidden;">{{ waveS1 }}</div>
    </div>

    <!-- RIGHT PANEL -->
    <div style="width:680px;flex-shrink:0;background:rgba(8,6,20,0.88);display:flex;flex-direction:column;padding:28px 30px;gap:20px;box-sizing:border-box;">
      <div style="font-size:12px;color:#E8A020;letter-spacing:0.14em;">♪ A BATUCAR</div>
      <div style="display:flex;align-items:center;gap:24px;">
        <div style="position:relative;width:220px;height:220px;flex-shrink:0;">
          <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(#1c1830 0deg,#28203e 35deg,#1c1830 70deg,#28203e 105deg,#1c1830 140deg,#28203e 175deg,#1c1830 210deg,#28203e 245deg,#1c1830 280deg,#28203e 315deg,#1c1830 350deg,#28203e 360deg);animation:amberPulse 3s ease-in-out infinite,{{ isPlaying ? 'spin 7s linear infinite' : 'none' }};">
            <div style="position:absolute;inset:8%;border-radius:50%;border:1px solid rgba(232,160,32,0.08);"></div>
            <div style="position:absolute;inset:18%;border-radius:50%;border:1px solid rgba(232,160,32,0.06);"></div>
            <div style="position:absolute;inset:28%;border-radius:50%;border:1px solid rgba(232,160,32,0.05);"></div>
          </div>
          <div style="position:absolute;top:50%;left:50%;width:96px;height:96px;margin:-48px;border-radius:50%;background:#130f26;border:2px solid rgba(232,160,32,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;z-index:5;overflow:hidden;">
            <sc-if value="{{ albumArt }}">
              <img src="{{ albumArt }}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
            </sc-if>
            <sc-if value="!{{ albumArt }}">
              <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:36px;height:36px;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
              <div style="font-size:9px;color:#E8A020;letter-spacing:0.04em;">2835</div>
            </sc-if>
          </div>
          <div style="position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px;border-radius:50%;background:#0d0b18;z-index:6;"></div>
        </div>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;">
          <div style="font-family:'VT323',monospace;font-size:44px;color:#f0e6d0;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ trackName || 'Nenhuma música' }}</div>
          <div style="font-family:'VT323',monospace;font-size:34px;color:#E8A020;">{{ artistName || 'Spotify' }}</div>
          <div style="margin-top:4px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span style="font-family:'VT323',monospace;font-size:24px;color:#555;">{{ progress || '0:00' }}</span>
              <span style="font-family:'VT323',monospace;font-size:24px;color:#3d9e46;">{{ duration || '0:00' }}</span>
            </div>
            <div style="height:6px;background:rgba(255,255,255,0.07);border-radius:3px;position:relative;">
              <div style="position:absolute;left:0;top:0;height:100%;width:{{ progressPercent || 0 }}%;background:linear-gradient(90deg,#FF6600,#E8A020);border-radius:3px;"></div>
              <div style="position:absolute;left:{{ progressPercent || 0 }}%;top:50%;width:14px;height:14px;margin:-7px;border-radius:50%;background:#E8A020;box-shadow:0 0 10px rgba(232,160,32,0.7);"></div>
            </div>
          </div>
        </div>
      </div>
      <div style="height:80px;display:flex;gap:4px;align-items:flex-end;overflow:hidden;">{{ waveEQ }}</div>
      <div style="height:2px;background:linear-gradient(90deg,transparent,rgba(232,160,32,0.3),transparent);"></div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div style="font-size:11px;color:#E8A020;letter-spacing:0.12em;margin-bottom:4px;">SEGUE AI BOY!</div>
        <div style="font-family:'VT323',monospace;font-size:32px;color:#f0e6d0;display:flex;flex-direction:column;gap:4px;">
          <div style="display:flex;align-items:center;gap:12px;"><span style="color:#E8A020;">▶</span><span>twitch.tv/Samuca2835</span></div>
          <div style="display:flex;align-items:center;gap:12px;"><span style="color:#E8A020;">▶</span><span>@Samuca2835</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:auto;">
        <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:32px;height:32px;opacity:0.6;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
        <div style="font-family:'VT323',monospace;font-size:36px;color:#3d9e46;letter-spacing:0.12em;white-space:nowrap;">RAPAZIS DI ZONA</div>
        <svg viewBox="0 0 16 16" style="image-rendering:pixelated;width:32px;height:32px;opacity:0.6;flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><use href="#ico-leaf"></use></svg>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080}}">
class Component extends DCLogic {
  state = { waves: null };
  componentDidMount() {
    const make = (n, prefix, cols) => Array.from({length: n}, (_, i) => {
      const dur = (1.1 + ((i * 0.14) % 1.3)).toFixed(2);
      const delay = ((i * 0.041) % 0.48).toFixed(2);
      return React.createElement('div', { key: `${prefix}-${i}`, style: { flex: 1, background: cols[i % cols.length], animation: `eqBar ${dur}s ease-in-out infinite ${delay}s`, transformOrigin: 'bottom', height: '100%', opacity: 0.75 } });
    });
    const fire = ['linear-gradient(0deg,#FF3300,#FF6600,#E8A020)','linear-gradient(0deg,#FF4400,#FF8800,#E8C020)','linear-gradient(0deg,#FF2200,#FF6600,#FFB300)'];
    const amber = ['linear-gradient(0deg,#CC7700,#E8A020,#FFD060)','linear-gradient(0deg,#BB6600,#E8B030,#FFE080)','linear-gradient(0deg,#DD8800,#E8A020,#FFC040)'];
    this.setState({ waves: { s1: make(36,'s1',fire), eq: make(28,'eq',amber) } });
  }
  renderVals() {
    const w = this.state.waves || {};
    return { waveS1: w.s1 || [], waveEQ: w.eq || [] };
  }
}
</script>
</body>
</html>
